- 반응형(모바일 퍼스트) 브레이크포인트 어긋남
- 접근성(대비·라벨) 누락

[경계] 실제 수정 → figma-implementer / frontend-dev
[출력: 고정 템플릿] Critical / Warning / Suggestion.
shared/ 규격 준수.
